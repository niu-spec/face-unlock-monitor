# GitHub Actions CI

name: CI

on:
  push:
    branches: [dev, main, "feature/**", "fix/**"]
  pull_request:
    branches: [dev, main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      DJANGO_SECRET_KEY: github-actions-test-key
      DJANGO_DEBUG: "True"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Backend test
        run: bash scripts/ci-backend-test.sh

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: bash scripts/ci-frontend-build.sh
