# GitHub Actions CI — home-camera-monitor
# GitLab.com 需国外手机号验证时使用此方案
# 文档：docs/CI-CD使用说明.md

name: CI

on:
  push:
    branches: [dev, main, "feature/**"]
  pull_request:
    branches: [dev, main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Django check
        env:
          CI: "true"
          DJANGO_SECRET_KEY: github-actions-test-key
          DJANGO_DEBUG: "True"
        run: python manage.py check

      - name: Run tests
        env:
          CI: "true"
          DJANGO_SECRET_KEY: github-actions-test-key
          DJANGO_DEBUG: "True"
        run: python manage.py test apps.face.tests --verbosity=2

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build
