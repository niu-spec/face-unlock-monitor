# Optional: local / server MediaMTX for RTMP ingest + RTSP/WebRTC egress.
# Usage:
#   docker compose up -d
#   PUBLIC_HOST=your.example.com docker compose up -d   # production ICE host

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: home-mediamtx
    restart: unless-stopped
    ports:
      - "9090:1935"      # RTMP (OBS)
      - "8554:8554"      # RTSP (Django / OpenCV)
      - "8889:8889"      # WebRTC HTTP
      - "8189:8189/udp"  # WebRTC ICE
    environment:
      MTX_WEBRTCADDITIONALHOSTS: ${PUBLIC_HOST:-127.0.0.1}
