# GitLab CI/CD — home-camera-monitor
# 文档：docs/CI-CD使用说明.md

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DJANGO_SETTINGS_MODULE: "config.settings"
  CI: "true"
  DJANGO_SECRET_KEY: "gitlab-ci-test-secret-key"
  DJANGO_DEBUG: "False"

# ── 后端：Django check + 单元测试 ──────────────────────────────────
backend-test:
  stage: test
  image: python:3.10-bookworm
  cache:
    key: pip-backend
    paths:
      - .cache/pip
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements-ci.txt
  script:
    - python manage.py check --deploy
    - python manage.py test apps.face.tests --verbosity=2
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feature\//

# ── 前端：Vite 构建 ────────────────────────────────────────────────
frontend-build:
  stage: build
  image: node:20-bookworm
  cache:
    key: npm-frontend
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feature\//

# ── 生产部署（手动触发，仅 main）────────────────────────────────────
deploy-production:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client git
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" << 'ENDSSH'
        set -e
        cd /service
        git fetch origin main
        git checkout main
        git pull origin main
        bash deploy/deploy-django.sh
        echo "Deploy completed."
      ENDSSH
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
    url: http://$DEPLOY_HOST
