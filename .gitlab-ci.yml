# DEPRECATED: GitLab.com 需身份验证，组员无法全员使用。
# 主 CI/CD 已迁移至 Jenkins（云服务器）+ GitHub Actions，见 docs/CI-CD使用说明.md
#
# GitLab CI/CD for home-camera-monitor (kept for reference)

stages:
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DJANGO_SETTINGS_MODULE: "config.settings"
  CI: "true"
  DJANGO_SECRET_KEY: "gitlab-ci-test-secret-key-not-for-production"
  DJANGO_DEBUG: "True"
  DJANGO_ALLOWED_HOSTS: "*"

backend-test:
  stage: test
  image: python:3.10-bookworm
  cache:
    key: pip-backend
    paths:
      - .cache/pip
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements-ci.txt
  script:
    - python manage.py check
    - python manage.py test apps.face.tests --verbosity=2
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feature\//

frontend-build:
  stage: build
  image: node:20-bookworm
  cache:
    key: npm-frontend
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feature\//

deploy-production:
  stage: deploy
  image: alpine:3.20
  needs:
    - backend-test
    - frontend-build
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "cd ${DEPLOY_PATH:-/service/home-camera-monitor} && DEPLOY_PATH=${DEPLOY_PATH:-/service/home-camera-monitor} DEPLOY_BRANCH=${DEPLOY_BRANCH:-$CI_COMMIT_BRANCH} SKIP_GIT_UPDATE=${SKIP_GIT_UPDATE:-0} DJANGO_SERVICE=${DJANGO_SERVICE:-home-camera-backend} bash deploy/deploy-all.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual
    - if: $CI_COMMIT_BRANCH =~ /^feature\//
      when: manual
  environment:
    name: production
    url: http://$DEPLOY_HOST
